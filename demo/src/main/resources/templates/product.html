<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{/layout::view(~{::title},~{::main})}">
<head>
  <meta charset="UTF-8">
  <title>Trang chủ</title>
</head>
<body>
<main>
  <div class="container">
    <div class="bread-crumb flex-w p-l-25 p-r-15 p-t-30 p-lr-0-lg">
      <a th:href="@{/}" class="stext-109 cl8 hov-cl1 trans-04">
        Home
        <i class="fa fa-angle-right m-l-9 m-r-10" aria-hidden="true"></i>
      </a>
      <span class="stext-109 cl4">
                Shop
             </span>
    </div>
  </div>

  <div class="bg0 m-t-23 p-b-140">
    <div class="container">
      <div class="flex-w flex-sb-m p-b-52">
        <div class="flex-w flex-l-m filter-tope-group m-tb-10">
          <button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5 how-active1" data-filter="*">
            Tất cả sản phẩm
          </button>
          <th:block th:each="category : ${categories}">
            <button class="stext-106 cl6 hov1 bor3 trans-04 m-r-32 m-tb-5" th:text="${category.name}" th:data-filter="'.'+${category.slug}"></button>
          </th:block>
        </div>

        <div class="flex-w flex-c-m m-tb-10">
          <div class="flex-c-m stext-106 cl6 size-104 bor4 pointer hov-btn3 trans-04 m-r-8 m-tb-4 js-show-filter">
            <i class="icon-filter cl2 m-r-6 fs-15 trans-04 zmdi zmdi-filter-list"></i>
            <i class="icon-close-filter cl2 m-r-6 fs-15 trans-04 zmdi zmdi-close dis-none"></i>
            Filter
          </div>
          <div class="flex-c-m stext-106 cl6 size-105 bor4 pointer hov-btn3 trans-04 m-tb-4 js-show-search">
            <i class="icon-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-search"></i>
            <i class="icon-close-search cl2 m-r-6 fs-15 trans-04 zmdi zmdi-close dis-none"></i>
            Search
          </div>
        </div>

        <div class="dis-none panel-search w-full p-t-10 p-b-15">
          <div class="bor8 dis-flex p-l-15">
            <button class="size-113 flex-c-m fs-16 cl2 hov-cl1 trans-04">
              <i class="zmdi zmdi-search"></i>
            </button>
            <input class="mtext-107 cl2 size-114 plh2 p-r-15" type="text" name="search-product" placeholder="Search">
          </div>
        </div>
        <div class="dis-none panel-filter w-full p-t-10">
        </div>
      </div>

      <div class="row isotope-grid">
        <div class="col-sm-6 col-md-4 col-lg-3 p-b-35 isotope-item" th:each="product : ${products}">
          <div class="block2">
            <div class="block2-pic hov-img0">
              <img th:src="@{|/images/${product.image}|}" th:alt="${product.name}">
              <a th:href="@{'/products/' + ${product.slug}}" class="block2-btn flex-c-m stext-103 cl2 size-102 bg0 bor2 hov-btn1 p-lr-15 trans-04">
                Quick View
              </a>
            </div>
            <div class="block2-txt flex-w flex-t p-t-14">
              <div class="block2-txt-child1 flex-col-l ">
                <a th:href="@{'/products/' + ${product.slug}}" th:text="${product.name}" class="stext-104 cl4 hov-cl1 trans-04 js-name-b2 p-b-6">
                  Product Name
                </a>
                <span class="stext-105 cl3" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT') + 'đ'}">
                  $XX.XX
                </span>
              </div>
              <div class="block2-txt-child2 flex-r p-t-3">
                <a href="#" class="btn-addwish-b2 dis-block pos-relative js-addwish-b2">
                  <img class="icon-heart1 dis-block trans-04" th:src="@{/images/icons/icon-heart-01.png}" alt="ICON">
                  <img class="icon-heart2 dis-block trans-04 ab-t-l" th:src="@{/images/icons/icon-heart-02.png}" alt="ICON">
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-c-m flex-w w-full p-t-45">
        <ul th:if="${totalPages > 0}" class="pagination-list">
          <li class="page-item" th:classappend="${products.hasPrevious() ? '' : 'disabled'}">
            <a class="page-link" th:href="@{/products(page=${products.number - 1})}" aria-label="Previous">
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>

          <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
              th:classappend="${i == products.number ? 'active' : ''}">
            <a class="page-link" th:href="@{/products(page=${i})}" th:text="${i + 1}"></a>
          </li>

          <li class="page-item" th:classappend="${products.hasNext() ? '' : 'disabled'}">
            <a class="page-link" th:href="@{/products(page=${products.number + 1})}" aria-label="Next">
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</main>
</body>
</html>
